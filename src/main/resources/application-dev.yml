spring:
  datasource:
    url: jdbc:h2:mem:forexdb;MODE=MySQL;DB_CLOSE_DELAY=-1 # 휘발성 데이터
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop # 휘발성 테이블
    show-sql: true

